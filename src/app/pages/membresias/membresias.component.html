<div class="p-6">

    <!-- Encabezado -->
    <div class="bg-gradient-to-r from-blue-600 to-purple-600 rounded-2xl p-8 text-center text-white shadow-lg">
        <h1 class="text-5xl font-bold">
            Membresías
        </h1>
        <p class="text-xl mt-3">
            Administración de membresías del gimnasio
        </p>
    </div>

    <!-- Botón y buscador -->
    <div class="bg-white rounded-2xl shadow-lg mt-8 p-6 flex justify-between items-center">
        
        <button (click)="abrirModal()" class="bg-gradient-to-r from-blue-600 to-purple-600 text-white px-6 py-3 rounded-xl font-bold hover:opacity-90 transition-opacity shadow-md">
            + Agregar Membresía
        </button>

        <!-- Input conectado bidireccionalmente para filtrar -->
        <input type="text" [(ngModel)]="filtroBusqueda" placeholder="Buscar membresía..." class="border rounded-xl px-5 py-3 w-80 outline-none focus:ring-2 focus:ring-blue-500">
    </div>

    <!-- Tabla -->
    <div class="mt-8 rounded-2xl overflow-hidden shadow-lg">
        <table class="w-full bg-white">
            <thead>
                <tr class="bg-gradient-to-r from-blue-600 to-purple-600 text-white">
                    <th class="p-5 text-left">Nombre</th>
                    <th class="p-5 text-left">Precio</th>
                    <th class="p-5 text-center">Acciones</th>
                </tr>
            </thead>
            <tbody>
                <!-- Directiva *ngFor iterando sobre el getter de filtrados -->
                <tr *ngFor="let membresia of membresiasFiltradas" class="border-b">
                    <td class="p-5 font-medium text-gray-800">
                        {{ membresia.nombre }}
                    </td>
                    <td class="p-5 text-gray-600">
                        ${{ membresia.precio }}
                    </td>
                    <td class="p-5 text-center">
                        <button (click)="editarMembresia(membresia)" class="bg-yellow-500 text-white px-4 py-2 rounded-lg mr-2 hover:bg-yellow-600 transition-colors">
                            Editar
                        </button>
                        <button (click)="eliminarMembresia(membresia)" class="bg-red-600 text-white px-4 py-2 rounded-lg hover:bg-red-700 transition-colors">
                            Eliminar
                        </button>
                    </td>
                </tr>

                <!-- Mensaje cuando la búsqueda no arroja resultados -->
                <tr *ngIf="membresiasFiltradas.length === 0">
                    <td colspan="3" class="p-8 text-center text-gray-400">
                        No se encontraron membresías.
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

</div>

<!-- VENTANA EMERGENTE (MODAL) -->
<div *ngIf="mostrarModal" class="fixed inset-0 bg-black/50 backdrop-blur-sm flex items-center justify-center z-50">

    <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md p-8 mx-4 transform transition-all">

        <!-- Cabecera del Modal -->
        <div class="flex justify-between items-center mb-6">
            <h2 class="text-2xl font-bold bg-gradient-to-r from-blue-600 to-purple-600 bg-clip-text text-transparent">
                {{ modoEdicion ? 'Editar Membresía' : 'Nueva Membresía' }}
            </h2>
            <button type="button" (click)="cerrarModal()" class="text-gray-400 hover:text-red-500 text-2xl transition-colors">
                ✕
            </button>
        </div>

        <!-- Formulario convencional usando ngModel -->
        <form (ngSubmit)="guardarMembresia()">

            <!-- Campo Nombre -->
            <div class="mb-5">
                <label class="block font-semibold text-gray-700 mb-2">
                    Nombre de la Membresía
                </label>
                <select name="nombre" [(ngModel)]="nuevaMembresia.nombre" required class="w-full border border-gray-200 rounded-xl px-4 py-3 focus:ring-2 focus:ring-blue-500 outline-none transition-all">
                    <option value="" disabled selected>Selecciona una opción</option>
                    <option value="Mensual">Mensual</option>
                    <option value="Semestral">Semestral</option>
                    <option value="Anual">Anual</option>
                </select>
            </div>

            <!-- Campo Precio -->
            <div class="mb-6">
                <label class="block font-semibold text-gray-700 mb-2">
                    Precio ($)
                </label>
                <input type="number" name="precio" [(ngModel)]="nuevaMembresia.precio" required placeholder="Ejemplo: 500" class="w-full border border-gray-200 rounded-xl px-4 py-3 focus:ring-2 focus:ring-blue-500 outline-none transition-all">
            </div>

            <!-- Botones de Acción -->
            <div class="flex justify-end gap-3">
                <button type="button" (click)="cerrarModal()" class="px-5 py-3 rounded-xl bg-gray-100 hover:bg-gray-200 text-gray-700 font-semibold transition-colors">
                    Cancelar
                </button>
                
                <button type="submit" class="px-5 py-3 rounded-xl bg-gradient-to-r from-blue-600 to-purple-600 text-white font-bold hover:opacity-90 transition-opacity">
                    {{ modoEdicion ? 'Actualizar' : 'Guardar' }}
                </button>
            </div>

        </form>

    </div>

</div>
