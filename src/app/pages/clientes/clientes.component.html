<div class="min-h-screen bg-gradient-to-br from-slate-100 via-blue-50 to-violet-100 p-8">

    <!-- Encabezado -->
    <div class="w-full bg-gradient-to-r from-blue-700 via-indigo-600 to-violet-700
         rounded-2xl shadow-xl p-8 mb-8 text-center">

        <h1 class="text-5xl font-extrabold tracking-wide text-white">
            Clientes
        </h1>

        <p class="text-blue-100 text-lg mt-2">
            Administración de clientes del gimnasio
        </p>

    </div>

    <!-- Barra superior -->
    <div class="bg-white rounded-2xl shadow-xl p-6 mb-8">

        <div class="flex justify-between items-center">

            <button (click)="abrirModal()" class="flex items-center gap-2 px-6 py-3 rounded-xl
                bg-gradient-to-r from-blue-600 to-violet-600
                text-white font-semibold shadow-lg
                hover:scale-105 hover:shadow-2xl
                transition duration-300">

                <span class="material-icons">add</span>

                Agregar Cliente

            </button>

            <input type="text" placeholder="Buscar cliente..." [(ngModel)]="filtroBusqueda" class="w-80 rounded-xl border border-gray-300 px-4 py-3
                focus:outline-none
                focus:ring-4
                focus:ring-violet-300
                shadow-sm">

        </div>

    </div>

    <!-- Tabla -->
    <div class="bg-white rounded-2xl shadow-xl overflow-hidden">

        <table class="w-full">

            <thead class="bg-gradient-to-r from-blue-700 to-violet-700 text-white">

                <tr>

                    <th class="text-left p-5">Nombre</th>

                    <th class="text-left p-5">Correo</th>

                    <th class="text-left p-5">Teléfono</th>

                    <th class="text-left p-5">Membresía</th>

                    <th class="text-center p-5">Acciones</th>

                </tr>

            </thead>

            <tbody>

                <tr *ngFor="let cliente of clientesFiltrados" class="border-b hover:bg-violet-50 transition">

                    <td class="p-5 font-medium">
                        {{cliente.nombre}}
                    </td>

                    <td class="p-5">
                        {{cliente.correo}}
                    </td>

                    <td class="p-5">
                        {{cliente.telefono}}
                    </td>

                    <!--  Muestra la membresía asignada al cliente -->
                    <td class="p-5 font-semibold text-indigo-600">
                        {{ cliente.membresia?.nombreMembresia || 'Sin membresía' }}
                    </td>

                    <td class="p-5">

                        <div class="flex justify-center gap-3">

                            <button (click)="editarCliente(cliente)"
                                class="flex items-center gap-1 bg-blue-500 hover:bg-blue-600 text-white px-4 py-2 rounded-lg shadow">

                                <span class="material-icons">
                                    edit
                                </span>

                                Editar

                            </button>

                            <button (click)="eliminarCliente(cliente.idCliente!)"
                                class="flex items-center gap-1 bg-red-500 hover:bg-red-600 text-white px-4 py-2 rounded-lg shadow">

                                <span class="material-icons">
                                    delete
                                </span>

                                Eliminar

                            </button>

                        </div>

                    </td>

                </tr>

            </tbody>

        </table>

    </div>

</div>

<!-- Modal -->
<div *ngIf="mostrarModal" class="fixed inset-0 bg-black/50 backdrop-blur-sm flex justify-center items-center z-50">

    <div class="bg-white rounded-3xl shadow-2xl w-[450px] p-8 animate-[fadeIn_.3s]">

        <h2 class="text-3xl font-bold text-center mb-8
            bg-gradient-to-r from-blue-700 to-violet-700
            bg-clip-text text-transparent">

            Agregar Cliente

        </h2>

        <div class="space-y-5">

            <input type="text" placeholder="Nombre completo" [(ngModel)]="nuevoCliente.nombre" class="w-full border rounded-xl px-4 py-3
                focus:ring-4 focus:ring-violet-300 outline-none">

            <input type="email" placeholder="Correo electrónico" [(ngModel)]="nuevoCliente.correo" class="w-full border rounded-xl px-4 py-3
                focus:ring-4 focus:ring-violet-300 outline-none">

            <input type="text" placeholder="Teléfono" [(ngModel)]="nuevoCliente.telefono" class="w-full border rounded-xl px-4 py-3
                focus:ring-4 focus:ring-violet-300 outline-none">

            <!--  Selector de membresías vinculadas al objeto cliente -->
            <div class="relative">
                <select [(ngModel)]="nuevoCliente.membresia" class="w-full border rounded-xl px-4 py-3 bg-white
                    focus:ring-4 focus:ring-violet-300 outline-none appearance-none cursor-pointer text-gray-700" required>
                    <option [ngValue]="null" disabled selected>Selecciona una membresía</option>
                    <option *ngFor="let m of membresias" [ngValue]="m">
                        {{ m.nombreMembresia }}
                    </option>
                </select>
                <!-- Icono de flecha decorativa -->
                <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-gray-500">
                    <span class="material-icons">expand_more</span>
                </div>
            </div>

        </div>

        <div class="flex justify-end gap-4 mt-8">

            <button (click)="cerrarModal()" class="px-5 py-3 rounded-xl bg-gray-300 hover:bg-gray-400 transition">

                Cancelar

            </button>

            <button (click)="guardarCliente()" class="px-6 py-3 rounded-xl
                bg-gradient-to-r
                from-blue-600
                to-violet-600
                text-white
                font-semibold
                hover:scale-105
                transition">

                Guardar

            </button>

        </div>

    </div>

</div>
